<!-- Show navbar always, but change links based on auth -->
<nav class="navbar">
  <div class="nav-brand">⚡ AI Resume Bot</div>
  <div class="nav-links">
    <ng-container *ngIf="authService.isLoggedIn()">
      <a routerLink="/" class="nav-link">Chat</a>
      <a routerLink="/resume" class="nav-link">Resume</a>
      <a routerLink="/jobs" class="nav-link">Jobs</a>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </ng-container>
    <ng-container *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" class="nav-link">Login</a>
      <a routerLink="/register" class="nav-link">Register</a>
    </ng-container>
  </div>
</nav>

<router-outlet />
