<div class="chat-wrapper">

  <div class="chat-header">
    <div class="header-dot"></div>
    <span>AI Mentor Chat</span>
    <span class="session-id" *ngIf="sessionId">Session: {{ sessionId }}</span>
  </div>

  <div class="chat-body" #chatBody>

    <div *ngIf="isStarting" class="status-msg">
      Connecting to AI...
    </div>

    <div *ngIf="!isStarting && messages.length === 0 && !streamingContent" class="status-msg">
      👋 Hi Hema! Ask me anything about Angular, Node.js, or AI.
    </div>

    <!-- Past messages -->
    <div *ngFor="let msg of messages"
         class="message-row"
         [class.user-row]="msg.role === 'user'"
         [class.ai-row]="msg.role === 'assistant'">
      <div class="bubble"
           [class.user-bubble]="msg.role === 'user'"
           [class.ai-bubble]="msg.role === 'assistant'">
        <span class="role-label">{{ msg.role === 'user' ? 'You' : 'AI' }}</span>
        <p>{{ msg.content }}</p>
      </div>
    </div>

    <!-- 👇 THIS is the streaming bubble — appears while AI is typing -->
    <div *ngIf="streamingContent" class="message-row ai-row">
      <div class="bubble ai-bubble">
        <span class="role-label">AI</span>
        <p>{{ streamingContent }}<span class="cursor">▋</span></p>
      </div>
    </div>

    <!-- Loading before first token arrives -->
    <div *ngIf="isLoading && !streamingContent" class="message-row ai-row">
      <div class="bubble ai-bubble">
        <span class="role-label">AI</span>
        <p class="typing">Thinking...</p>
      </div>
    </div>

  </div>

  <div class="chat-input-area">
    <textarea
      [(ngModel)]="userInput"
      (keydown)="onKeyDown($event)"
      placeholder="Ask something... (Enter to send)"
      rows="2"
      [disabled]="isLoading || isStarting">
    </textarea>
    <button
      (click)="sendMessage()"
      [disabled]="isLoading || isStarting || !userInput.trim()">
      {{ isLoading ? '...' : 'Send' }}
    </button>
  </div>

</div>
