<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="logo">⚡</div>
      <h1>Create account</h1>
      <p>Start using AI Resume Bot for free</p>
    </div>

    <div class="auth-body">

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <div class="field">
        <label>Full Name</label>
        <input
          type="text"
          [(ngModel)]="name"
          placeholder="Hemalatha"
          [disabled]="isLoading" />
      </div>

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="hema@example.com"
          [disabled]="isLoading" />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Min 6 characters"
          [disabled]="isLoading"
          (keydown.enter)="register()" />
      </div>

      <button (click)="register()" [disabled]="isLoading" class="auth-btn">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

      <p class="switch-link">
        Already have an account?
        <a routerLink="/login">Sign in here</a>
      </p>

    </div>
  </div>
</div>
