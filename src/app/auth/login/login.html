<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="logo">⚡</div>
      <h1>Welcome back</h1>
      <p>Sign in to your AI Resume Bot</p>
    </div>

    <div class="auth-body">

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="hema@example.com"
          [disabled]="isLoading" />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="••••••"
          [disabled]="isLoading"
          (keydown.enter)="login()" />
      </div>

      <button (click)="login()" [disabled]="isLoading" class="auth-btn">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="switch-link">
        Don't have an account?
        <a routerLink="/register">Register here</a>
      </p>

    </div>
  </div>
</div>
